# Viland configuration
# Double-tap timeout in seconds
double_tap_timeout = 0.5

# Enable/disable caps2esc behavior (caps = esc + ctrl)
caps2esc = true

# Mode indicator (notify | none)
notification = "notify"

# Enable system tray icon (doesn't work on Wayland without tray manager)
tray = false

[keys]
# Normal mode key mappings
# Arrow keys
h = "left"
j = "down"
k = "up"
l = "right"

# Word navigation
w = "C-right"
b = "C-left"
e = "end"

# Line navigation
zero = "home"
dollar = "end"
g = "home"

# Exit to insert (special - handled in code)
i = "exit-insert"
a = "exit-insert-right"

# New line
o = "end-enter-up"

# Delete char
s = "backspace"
x = "backspace"

# Search
slash = "C-f"
n = "right"

# Command mode (press ; or :)
colon = "command"
semicolon = "command"

# Undo/redo
u = "C-z"
r = "C-y"

# Paste
p = "C-v"

# Escape
escape = "escape"
tab = "tab"