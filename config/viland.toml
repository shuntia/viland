# Viland configuration
# Double-tap timeout in seconds
double_tap_timeout = 0.5

# Enable/disable caps2esc behavior (caps = esc + ctrl)
caps2esc = true

# Mode indicator (notify | none)
notification = "notify"

[keys]
# Normal mode key mappings
# Arrow keys
h = "left"
j = "down"
k = "up"
l = "right"

# Word navigation
w = "C-right"
b = "C-left"
e = "end"

# Line navigation
zero = "home"
dollar = "end"
g = "home"

# Exit to insert
i = "escape"
a = "escape-right"
o = "end-enter-up"
s = "backspace"
escape = "escape"

# Delete char
x = "backspace"

# Search
slash = "C-f"
n = "right"

# Undo/redo
u = "C-z"
r = "C-y"

# Paste
p = "C-v"