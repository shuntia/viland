# Viland configuration for Hyprland
# Source this in your hyprland.conf or add exec-once to start the daemon
#
# Add to hyprland.conf:
# exec-once = python3 -m viland.daemon

# Key mapping reference:
# - Double-tap caps_lock: Toggle normal mode
# - In normal mode:
#   q -> left
#   h -> down
#   j -> left  (note: standard vim is j=down, but this maps to arrows)
#   k -> up
#   l -> right
#   i -> exit to idle
#   a -> exit to idle (insert mode)